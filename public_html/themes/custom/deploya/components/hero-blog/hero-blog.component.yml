"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Hero blog
description: Hero component for the blog content type.
group: Hero
props:
  type: object
  properties:
    heading_text:
      type: string
      title: Heading
      default: "Enter the title"
      examples:
        - "Vivamus curae metus neque mollis orci ipsum sapien velit cursus"

    level:
      type: integer
      title: Heading level
      enum: [1, 2, 3, 4, 5, 6]
      examples:
        - 1

    date:
      type: string
      title: Published Date

    author:
      type: string
      title: Author
      examples:
        - "John Smith"

    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/hero-image.jpg"
          alt: "Blue-green graphic with a gradient effect"
          width: 1920
          height: 1056
