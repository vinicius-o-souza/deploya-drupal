$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Video
group: Base
status: stable
props:
  type: object
  properties:
    media:
      title: Video
      type: object
      $ref: json-schema-definitions://canvas.module/video
    poster:
      $ref: json-schema-definitions://canvas.module/image
      title: Thumbnail
      type: object
    caption:
      title: Description
      type: string
    autoplay:
      title: Autoplay
      type: boolean
    controls:
      title: Display video controls
      type: boolean
    muted:
      title: Mute the audio
      type: boolean
    loop:
      title: Play on a loop
      type: boolean

libraryOverrides:
  js:
    video.js: { attributes: { type: module } }
